<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAC - Gestão Financeira e Compliance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 3px solid #27ae60; padding-bottom: 10px; color: #2c3e50; }
        
        /* Painel de Lançamento */
        .finance-panel { display: flex; gap: 10px; margin-bottom: 20px; background: #27ae60; padding: 20px; border-radius: 5px; flex-wrap: wrap; }
        input, select, button { padding: 12px; border-radius: 4px; border: 1px solid #ddd; }
        input[type="text"], input[type="number"] { flex-grow: 1; }
        .btn-add { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Cards de Resumo */
        .summary { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; padding: 20px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .balance { background: #2980b9; }
        .income { background: #27ae60; }
        .expense { background: #c0392b; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; }
        .type-in { color: #27ae60; font-weight: bold; }
        .type-out { color: #c0392b; font-weight: bold; }
        .btn-nav { display: inline-block; margin-bottom: 10px; text-decoration: none; color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-nav">← Voltar ao Sistema Principal</a>
    <h2>GAC Financeiro - Fluxo de Caixa</h2>

    <div class="summary">
        <div class="card income">Entradas: <span id="totalIncome">R$ 0,00</span></div>
        <div class="card expense">Saídas: <span id="totalExpense">R$ 0,00</span></div>
        <div class="card balance">Saldo: <span id="totalBalance">R$ 0,00</span></div>
    </div>

    <div class="finance-panel">
        <input type="text" id="desc" placeholder="Descrição (Ex: Honorários, Internet...)">
        <input type="number" id="val" placeholder="Valor (R$)">
        <select id="type">
            <option value="in">Entrada (+)</option>
            <option value="out">Saída (-)</option>
        </select>
        <button class="btn-add" onclick="addTransaction()">Lançar Valor</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Tipo</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="financeTable"></tbody>
    </table>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('gac_finance')) || [];

    window.onload = renderFinance;

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const val = parseFloat(document.getElementById('val').value);
        const type = document.getElementById('type').value;

        if(!desc || isNaN(val)) { alert("Preencha os campos corretamente."); return; }

        transactions.push({ desc, val, type });
        localStorage.setItem('gac_finance', JSON.stringify(transactions));
        
        renderFinance();
        document.getElementById('desc').value = "";
        document.getElementById('val').value = "";
    }

    function renderFinance() {
        const table = document.getElementById('financeTable');
        table.innerHTML = "";
        let income = 0; let expense = 0;

        transactions.forEach((t, i) => {
            const row = table.insertRow();
            const colorClass = t.type === 'in' ? 'type-in' : 'type-out';
            const symbol = t.type === 'in' ? '+' : '-';
            
            if(t.type === 'in') income += t.val; else expense += t.val;

            row.innerHTML = `
                <td>${t.desc}</td>
                <td class="${colorClass}">R$ ${t.val.toFixed(2)}</td>
                <td>${t.type === 'in' ? 'ENTRADA' : 'SAÍDA'}</td>
                <td><button onclick="deleteTrans(${i})" style="color:red; cursor:pointer; border:none; background:none;">Excluir</button></td>
            `;
        });

        document.getElementById('totalIncome').innerText = `R$ ${income.toFixed(2)}`;
        document.getElementById('totalExpense').innerText = `R$ ${expense.toFixed(2)}`;
        document.getElementById('totalBalance').innerText = `R$ ${(income - expense).toFixed(2)}`;
    }

    function deleteTrans(i) {
        transactions.splice(i, 1);
        localStorage.setItem('gac_finance', JSON.stringify(transactions));
        renderFinance();
    }
</script>

</body>
</html>
