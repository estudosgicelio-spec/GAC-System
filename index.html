<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAC - Gestão Administrativa e Compliance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; color: #333; margin: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 3px solid #2c3e50; padding-bottom: 10px; color: #2c3e50; display: flex; justify-content: space-between; align-items: center; }
        
        /* Painel de Controle Admin */
        .control-panel { display: flex; gap: 10px; margin-bottom: 20px; background: #2c3e50; padding: 20px; border-radius: 5px; flex-wrap: wrap; align-items: center; }
        input, select, button { padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 14px; }
        input[type="text"] { flex-grow: 2; }
        .btn-add { background-color: #27ae60; color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; flex-grow: 1; }
        .btn-add:hover { background-color: #219150; }

        /* Barra de Busca Amarela (Filtro) */
        .search-bar { width: 100%; padding: 15px; border: 2px solid #2c3e50; border-radius: 5px; font-size: 16px; background-color: #fffde7; margin-bottom: 20px; box-sizing: border-box; }

        /* Tabela de Auditoria */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f9f9f9; }
        
        /* Status Coloridos */
        .status { padding: 6px 12px; border-radius: 20px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; display: inline-block; text-align: center; min-width: 100px; }
        .status-open { background-color: #e67e22; color: white; }
        .status-closed { background-color: #27ae60; color: white; }
        .status-deleted { background-color: #c0392b; color: white; }
        
        .version-tag { font-size: 12px; background: #eee; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GAC - Gestão e Compliance <span class="version-tag">v3.1 Final - Persistência Ativada</span></h2>
    
    <div class="control-panel">
        <input type="text" id="docName" placeholder="Nome do Documento ou Processo">
        <select id="docType">
            <option value="TI">TI</option>
            <option value="JUR">JURÍDICO</option>
            <option value="ADM">ADM</option>
        </select>
        <select id="docStatus">
            <option value="open">PENDENTE</option>
            <option value="closed">CONCLUÍDO</option>
            <option value="deleted">CANCELADO</option>
        </select>
        <button class="btn-add" onclick="addDocument()">REGISTRAR PROTOCOLO</button>
    </div>

    <input type="text" id="searchInput" class="search-bar" onkeyup="filterTable()" placeholder="🔍 Pesquisar protocolo ou documento salvo...">

    <table>
        <thead>
            <tr>
                <th>Data/Registro</th>
                <th>Protocolo de Rastreio</th>
                <th>Categoria</th>
                <th>Status (Clique p/ excluir)</th>
            </tr>
        </thead>
        <tbody id="logTable">
            </tbody>
    </table>
</div>

<script>
    // Iniciar sistema carregando os dados do navegador
    window.onload = function() {
        renderTable();
    };

    // Função para Adicionar e Salvar
    function addDocument() {
        const name = document.getElementById('docName').value;
        const type = document.getElementById('docType').value;
        const status = document.getElementById('docStatus').value;
        const date = new Date();
        const dateStr = date.toISOString().slice(0, 10).replace(/-/g, '');
        const timeStr = date.toLocaleTimeString();

        if(!name) { alert("Admin: Digite o nome do documento."); return; }

        const protocol = `${dateStr}_${type}_${name.toUpperCase().replace(/ /g, '_')}`;
        const statusText = status === 'open' ? 'PENDENTE' : status === 'closed' ? 'CONCLUÍDO' : 'CANCELADO';

        const newLog = {
            timestamp: `${date.toLocaleDateString()} ${timeStr}`,
            protocol: protocol,
            type: type,
            status: status,
            statusText: statusText
        };

        // Salvar no Banco Local (LocalStorage)
        let logs = JSON.parse(localStorage.getItem('gac_logs')) || [];
        logs.unshift(newLog); // Novo registro no topo
        localStorage.setItem('gac_logs', JSON.stringify(logs));

        renderTable();
        document.getElementById('docName').value = ""; // Limpar campo
    }

    // Desenhar a tabela na tela
    function renderTable() {
        const table = document.getElementById('logTable');
        table.innerHTML = ""; 
        
        let logs = JSON.parse(localStorage.getItem('gac_logs')) || [];

        if (logs.length === 0) {
            table.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Nenhum protocolo registrado neste navegador.</td></tr>";
            return;
        }

        logs.forEach((log, index) => {
            const row = table.insertRow();
            row.innerHTML = `
                <td>${log.timestamp}</td>
                <td><strong>${log.protocol}</strong></td>
                <td>${log.type}</td>
                <td><button class="status status-${log.status}" onclick="removeLog(${index})">${log.statusText}</button></td>
            `;
        });
    }

    // Deletar registro do banco
    function removeLog(index) {
        if(confirm("Deseja apagar este registro do histórico local?")) {
            let logs = JSON.parse(localStorage.getItem('gac_logs'));
            logs.splice(index, 1);
            localStorage.setItem('gac_logs', JSON.stringify(logs));
            renderTable();
        }
    }

    // Filtro de Busca
    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let tr = document.getElementById("logTable").getElementsByTagName("tr");

        for (let i = 0; i < tr.length; i++) {
            let text = tr[i].innerText.toUpperCase();
            tr[i].style.display = text.indexOf(input) > -1 ? "" : "none";
        }
    }
</script>

</body>
</html>
